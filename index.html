<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelulusan SD Negeri Ngronggo 8 Kediri</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:
linear-gradient(135deg,#0F172A,#1E3A8A,#2563EB);
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.2);
}

.gold{
background:linear-gradient(135deg,#FFD700,#F5C542);
}

.gold-text{
background:linear-gradient(135deg,#FFD700,#FFF5B7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.fade-in{
animation:fade .6s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body class="text-white">

<div class="container mx-auto px-4 py-8">

<!-- HEADER -->
<div class="max-w-4xl mx-auto">

<div class="glass rounded-3xl p-8 shadow-2xl">

<div class="text-center">

<img
src="LOGO.png"
alt="Logo SD Negeri Ngronggo 8 Kediri"
class="w-40 h-40 mx-auto rounded-full border-2 border-gold-400 shadow-lg">

<h1 class="text-3xl md:text-5xl font-bold mt-5 gold-text">
PENGUMUMAN KELULUSAN
</h1>

<h2 class="text-xl md:text-2xl font-semibold mt-2">
SD Negeri Ngronggo 8 Kediri
</h2>

<p class="mt-2 text-blue-100">
Tahun Pelajaran 2025/2026
</p>

</div>

<!-- COUNTDOWN -->
<div id="countdownBox" class="mt-8">

<h3 class="text-center text-lg mb-4">
Pengumuman akan dibuka dalam:
</h3>

<div class="grid grid-cols-4 gap-3 text-center">

<div class="glass rounded-xl p-3">
<div id="days" class="text-3xl font-bold">0</div>
<div>Hari</div>
</div>

<div class="glass rounded-xl p-3">
<div id="hours" class="text-3xl font-bold">0</div>
<div>Jam</div>
</div>

<div class="glass rounded-xl p-3">
<div id="minutes" class="text-3xl font-bold">0</div>
<div>Menit</div>
</div>

<div class="glass rounded-xl p-3">
<div id="seconds" class="text-3xl font-bold">0</div>
<div>Detik</div>
</div>

</div>

</div>

<!-- SEARCH -->
<div id="searchSection" class="hidden mt-8">

<div class="max-w-xl mx-auto">

<label class="block mb-2 font-medium">
Masukkan NISN
</label>

<div class="flex gap-3">

<input
type="text"
id="nisn"
placeholder="Contoh: 0123456789"
class="flex-1 px-4 py-3 rounded-xl text-gray-800 focus:outline-none"
>

<button
onclick="cariData()"
class="gold text-black font-semibold px-6 rounded-xl hover:scale-105 transition">
Cari
</button>

</div>

</div>

</div>

<!-- RESULT -->
<div id="result" class="hidden mt-8 fade-in"></div>

</div>

</div>

</div>

<script>

/* ============================
   KONFIGURASI
============================ */

const API_URL =
"https://script.google.com/macros/s/AKfycbx2cG-_dB9BhLsFqXonguji8BWuJBeyVKjSvG529LojpzbNfxH8lHaRT5BWAPYJ5lC5ZA/exec";

const releaseDate =
new Date("2026-05-31T10:00:00");

/* ============================
   COUNTDOWN
============================ */

function updateCountdown(){

const now = new Date();
const distance = releaseDate - now;

if(distance <= 0){

document.getElementById('countdownBox').style.display='none';
document.getElementById('searchSection').classList.remove('hidden');

return;
}

const days =
Math.floor(distance/(1000*60*60*24));

const hours =
Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const minutes =
Math.floor((distance%(1000*60*60))/(1000*60));

const seconds =
Math.floor((distance%(1000*60))/1000);

document.getElementById('days').innerText=days;
document.getElementById('hours').innerText=hours;
document.getElementById('minutes').innerText=minutes;
document.getElementById('seconds').innerText=seconds;

}

setInterval(updateCountdown,1000);
updateCountdown();

/* ============================
   CARI DATA
============================ */

async function cariData(){

const nisn =
document.getElementById('nisn').value.trim();

if(!nisn){
alert("Masukkan NISN terlebih dahulu");
return;
}

const result =
document.getElementById('result');

result.classList.remove('hidden');

result.innerHTML=`
<div class="text-center py-10">
Memuat data...
</div>
`;

try{

const response =
await fetch(`${API_URL}?nisn=${nisn}`);

const data =
await response.json();

if(!data.success){

result.innerHTML=`
<div class="glass rounded-3xl p-8 text-center">
Data tidak ditemukan.
</div>
`;

return;
}

const siswa = data.data;

let badgeColor =
siswa.status === "LULUS"
? "bg-green-500"
: "bg-red-500";

result.innerHTML=`

<div class="glass rounded-3xl p-8">

<div class="text-center">

<h3 class="text-2xl font-bold mb-4">
Hasil Kelulusan
</h3>

<div class="${badgeColor} inline-block px-6 py-3 rounded-full text-xl font-bold">
${siswa.status}
</div>

</div>

<div class="grid md:grid-cols-2 gap-4 mt-8">

<div>
<label class="text-blue-200">
Nama Lengkap
</label>
<div class="font-semibold">
${siswa.nama}
</div>
</div>

<div>
<label class="text-blue-200">
NISN
</label>
<div class="font-semibold">
${siswa.nisn}
</div>
</div>

<div>
<label class="text-blue-200">
Kelas
</label>
<div class="font-semibold">
${siswa.kelas}
</div>
</div>

<div>
<label class="text-blue-200">
Tempat, Tanggal Lahir
</label>
<div class="font-semibold">
${siswa.ttl}
</div>
</div>

<div>
<label class="text-blue-200">
Nomor SKL
</label>
<div class="font-semibold">
${siswa.nomor_skl}
</div>
</div>

</div>

<div class="mt-8">

<label class="text-blue-200">
Pesan Sekolah
</label>

<div class="mt-2 bg-white/10 rounded-xl p-4">
${siswa.pesan}
</div>

</div>

<div class="mt-8 text-center">

<a
href="${siswa.skl || '#'}"
target="_blank"
class="gold inline-block px-8 py-3 rounded-xl text-black font-bold">

Unduh SKL

</a>

</div>

</div>
`;

if(siswa.status.toUpperCase()==="LULUS"){
launchConfetti();
}

}catch(error){

result.innerHTML=`
<div class="glass rounded-3xl p-8 text-center">
Terjadi kesalahan saat mengambil data.
</div>
`;

}

}

/* ============================
   CONFETTI
============================ */

function launchConfetti(){

confetti({
particleCount:150,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{
confetti({
particleCount:100,
spread:120
});
},500);

}

</script>

</body>
</html>
