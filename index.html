<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengumuman Kelulusan 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
    }
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl">

  <!-- HEADER -->
  <div class="glass rounded-2xl p-6 text-center shadow-2xl">
    
    <img src="https://drive.google.com/uc?export=view&id=1mxzXpl2pPt2TD__D0CquD5-KsH4WrkZd"
         class="w-20 mx-auto mb-3"/>

    <h1 class="text-2xl font-bold">SD NEGERI NGRONGGO 8 KEDIRI</h1>
    <p class="text-sm opacity-80">Pengumuman Kelulusan 2025/2026</p>

    <div class="mt-4 text-yellow-300 font-semibold">
      📅 2 Juni 2026 • 🕒 15.00 WIB
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div class="glass mt-4 p-4 rounded-2xl text-center">
    <h2 class="text-lg font-semibold mb-2">Hitung Mundur Pengumuman</h2>
    <div id="countdown" class="text-xl font-bold text-yellow-300"></div>
  </div>

  <!-- SEARCH -->
  <div class="glass mt-4 p-6 rounded-2xl">
    <h2 class="text-center font-semibold mb-3">Cek Kelulusan (NISN)</h2>

    <div class="flex gap-2">
      <input id="nisn" type="text" placeholder="Masukkan NISN"
        class="w-full p-2 rounded-lg text-black"/>

      <button onclick="cekKelulusan()"
        class="bg-yellow-400 text-black px-4 rounded-lg font-bold">
        Cek
      </button>
    </div>

    <div id="result" class="mt-4 hidden"></div>
  </div>

</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbx2cG-_dB9BhLsFqXonguji8BWuJBeyVKjSvG529LojpzbNfxH8lHaRT5BWAPYJ5lC5ZA/exec";

// COUNTDOWN
const targetDate = new Date("2026-06-02T15:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "PENGUMUMAN SUDAH DIBUKA 🎉";
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    `${d} Hari ${h} Jam ${m} Menit ${s} Detik`;
}, 1000);

// CEK KELULUSAN
async function cekKelulusan() {
  const nisn = document.getElementById("nisn").value;
  const resDiv = document.getElementById("result");

  resDiv.classList.remove("hidden");
  resDiv.innerHTML = "Loading...";

  try {
    const res = await fetch(apiURL + "?nisn=" + nisn);
    const data = await res.json();

    if (!data || !data.nama) {
      resDiv.innerHTML = "<p class='text-red-300'>Data tidak ditemukan</p>";
      return;
    }

    if (data.status === "LULUS") {
      confetti();
    }

    resDiv.innerHTML = `
      <div class="glass p-4 rounded-xl mt-3">
        <p><b>Nama:</b> ${data.nama}</p>
        <p><b>NISN:</b> ${data.nisn}</p>
        <p><b>Kelas:</b> ${data.kelas}</p>
        <p><b>TTL:</b> ${data.ttl}</p>
        <p><b>Status:</b> <span class="text-green-300 font-bold">${data.status}</span></p>
        <p><b>SKL:</b> ${data.skl || "Menyusul"}</p>
        <p class="mt-2 italic">${data.pesan || ""}</p>

        <button class="mt-3 bg-yellow-400 text-black px-3 py-1 rounded-lg">
          Unduh SKL
        </button>
      </div>
    `;
  } catch (e) {
    resDiv.innerHTML = "<p class='text-red-300'>Error mengambil data</p>";
  }
}
</script>

</body>
</html>
